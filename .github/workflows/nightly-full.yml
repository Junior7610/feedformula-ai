name: Nightly Full Automatic Tests

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  tests-nightly-complet:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install requests

      - name: Start API server (background)
        run: |
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 > backend_test.log 2>&1 &
          sleep 10

      - name: Run full automatic test suite (non-blocking)
        continue-on-error: true
        run: python tests/test_complet_automatique.py

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-full-tests-artifacts
          path: |
            docs/RAPPORT_TESTS_AUTOMATIQUES_COMPLET.md
            backend_test.log
            docs/test_run_output.txt
