<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="FeedFormula AI - Classement temps réel des éleveurs, podium et statut de ligue."
        />
        <title>FeedFormula AI - Classement</title>
        <link rel="stylesheet" href="./style.css" />
        <script
            defer
            src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
        ></script>
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
        ></script>
        <script defer src="./api.js"></script>
        <script defer src="./script.js"></script>
        <script defer src="./api_bindings.js"></script>
    </head>
    <body data-page="classement">
        <!-- En-tête de la page classement -->
        <header class="app-header app-header--sticky" role="banner">
            <a
                class="app-header__back"
                href="./index.html"
                aria-label="Retour à l'accueil"
                >←</a
            >

            <div class="app-header__title-wrap">
                <h1>🏆 Classement</h1>
                <span class="badge-star">Saison en cours</span>
            </div>

            <a
                href="./profil.html"
                class="app-header__avatar"
                aria-label="Ouvrir le profil"
            >
                <img src="../assets/aya_joie.png" alt="Avatar utilisateur" />
            </a>
        </header>

        <main class="app-main app-main--with-nav">
            <!-- Onglets de sélection du classement -->
            <section class="card-shell" aria-label="Sélecteur de classement">
                <div
                    class="tabs-row"
                    role="tablist"
                    aria-label="Portée du classement"
                >
                    <button
                        class="filter-pill is-active"
                        data-board="commune"
                        type="button"
                    >
                        Ma Commune
                    </button>
                    <button
                        class="filter-pill"
                        data-board="departement"
                        type="button"
                    >
                        Département
                    </button>
                    <button
                        class="filter-pill"
                        data-board="national"
                        type="button"
                    >
                        National
                    </button>
                </div>

                <p class="countdown-note">
                    Fin de saison dans
                    <strong id="seasonCountdown">--j --:--:--</strong>
                </p>
            </section>

            <!-- Podium Top 3 -->
            <section
                class="podium-zone card-shell"
                aria-label="Podium des trois premiers"
            >
                <div class="section-title-row">
                    <h2>Podium Top 3</h2>
                </div>

                <div id="podium" class="podium">
                    <!-- Le podium est injecté par JavaScript -->
                </div>
            </section>

            <!-- Rangs 4 à 50 -->
            <section class="card-shell" aria-label="Liste des rangs">
                <div class="section-title-row">
                    <h2>Rangs 4 à 50</h2>
                </div>

                <div id="rankingList" class="ranking-list">
                    <!-- La liste est injectée par JavaScript -->
                </div>
            </section>

            <!-- Statut de ligue -->
            <section class="card-shell" aria-label="Statut de ligue">
                <div
                    id="leagueStatus"
                    class="league-status league-status--neutral"
                >
                    ➡️ Tu es en zone neutre
                </div>

                <a
                    href="./nutricore.html"
                    class="primary-action primary-action--link"
                >
                    Améliorer mon rang
                </a>
            </section>
        </main>

        <!-- Navigation basse commune -->
        <nav class="bottom-nav" aria-label="Navigation principale">
            <a class="bottom-nav__item" href="./index.html"
                >🏠<span>Accueil</span></a
            >
            <a class="bottom-nav__item" href="./modules.html"
                >📦<span>Modules</span></a
            >
            <a class="bottom-nav__item is-active" href="./classement.html"
                >🏆<span>Classement</span></a
            >
            <a class="bottom-nav__item" href="./profil.html"
                >👤<span>Profil</span></a
            >
        </nav>
    </body>
</html>
