<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <meta name="theme-color" content="#8E24AA" />
        <meta
            name="description"
            content="FeedFormula AI — ReproTrack, calendrier reproduction et alertes 48h avant mise-bas."
        />
        <title>FeedFormula AI — ReproTrack</title>
        <link rel="stylesheet" href="style.min.css" />
        <style>
            body {
                margin: 0;
                font-family:
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    sans-serif;
                background: #f8f4fb;
                color: #341842;
            }
            .wrap {
                max-width: 1040px;
                margin: 0 auto;
                padding: 16px 16px 120px;
            }
            .grid {
                display: grid;
                gap: 16px;
            }
            .card {
                background: #fff;
                border-radius: 20px;
                padding: 16px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            }
            .input,
            .select {
                width: 100%;
                border: 1px solid #ddd;
                border-radius: 14px;
                padding: 14px;
                font-size: 16px;
                box-sizing: border-box;
            }
            .btn {
                border: 0;
                border-radius: 16px;
                padding: 16px;
                font-size: 17px;
                font-weight: 700;
                cursor: pointer;
            }
            .primary {
                background: #8e24aa;
                color: #fff;
            }
            .secondary {
                background: #f3f3f3;
                color: #222;
            }
            .calendar {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 8px;
            }
            .day {
                padding: 10px;
                border-radius: 12px;
                background: #f8f8f8;
                min-height: 48px;
                text-align: center;
            }
            .heat {
                background: #fff3e0;
            }
            .ai {
                background: #ede7f6;
            }
            .birth {
                background: #e8f5e9;
            }
            .metric {
                background: #fafafa;
                border-radius: 14px;
                padding: 14px;
            }
            .metric strong {
                display: block;
                font-size: 22px;
            }
            .alert {
                padding: 14px;
                border-radius: 14px;
                background: #f9f0fb;
            }
            .alert.urgent {
                background: #ffebee;
            }
            .meta {
                color: #666;
                font-size: 14px;
            }
            .event-item {
                padding: 12px 0;
                border-bottom: 1px solid #eee;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <header class="card">
                <h1>📅 ReproTrack</h1>
                <p class="meta">
                    Calendrier de reproduction, alertes 48h et statistiques du
                    troupeau.
                </p>
            </header>

            <main class="grid">
                <section class="card">
                    <h2>Calendrier du mois</h2>
                    <div id="calendar" class="calendar"></div>
                </section>

                <section class="card">
                    <h2>Enregistrer un événement</h2>
                    <div style="display: grid; gap: 12px">
                        <select id="type" class="select">
                            <option>Saillie</option>
                            <option>Insémination</option>
                            <option>Mise-bas</option>
                            <option>Chaleur observée</option>
                        </select>
                        <input
                            id="animal"
                            class="input"
                            placeholder="Nom ou numéro de l’animal"
                        />
                        <input
                            id="species"
                            class="input"
                            placeholder="Espèce (vache, chèvre...)"
                        />
                        <input id="date" class="input" type="date" />
                        <input
                            id="notes"
                            class="input"
                            placeholder="Notes optionnelles"
                        />
                        <button
                            id="saveEvent"
                            class="btn primary"
                            type="button"
                        >
                            Enregistrer
                        </button>
                    </div>
                </section>

                <section class="card">
                    <h2>Alertes 48h avant mise-bas</h2>
                    <div id="alerts"></div>
                </section>

                <section class="card">
                    <h2>Statistiques du troupeau</h2>
                    <div
                        id="stats"
                        style="
                            display: grid;
                            grid-template-columns: repeat(3, 1fr);
                            gap: 12px;
                        "
                    ></div>
                </section>

                <section class="card">
                    <h2>Événements du jour</h2>
                    <div
                        style="
                            display: grid;
                            grid-template-columns: 1fr 1fr 1fr;
                            gap: 8px;
                            margin-bottom: 12px;
                        "
                    >
                        <input
                            id="filterAnimal"
                            class="input"
                            placeholder="Filtre animal"
                        />
                        <input id="filterDate" class="input" type="date" />
                        <input
                            id="filterType"
                            class="input"
                            placeholder="Filtre type"
                        />
                    </div>
                    <button
                        id="refreshList"
                        class="btn secondary"
                        type="button"
                    >
                        Actualiser
                    </button>
                    <div id="events" style="margin-top: 12px"></div>
                </section>
            </main>
        </div>

        <script>
            const userId =
                localStorage.getItem("feedformula_user_id") || "demo-user";
            const $ = (s) => document.querySelector(s);
            const calendar = $("#calendar");
            const alerts = $("#alerts");
            const stats = $("#stats");
            const events = $("#events");
            const type = $("#type");
            const animal = $("#animal");
            const species = $("#species");
            const dateInput = $("#date");
            const notes = $("#notes");
            const filterAnimal = $("#filterAnimal");
            const filterDate = $("#filterDate");
            const filterType = $("#filterType");

            function buildCalendar(items) {
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                const first = new Date(year, month, 1).getDay();
                const total = new Date(year, month + 1, 0).getDate();
                const labels = ["D", "L", "M", "M", "J", "V", "S"];
                const cells = labels.map(
                    (d) => `<div class="day"><strong>${d}</strong></div>`,
                );
                for (let i = 0; i < first; i += 1)
                    cells.push('<div class="day"></div>');
                const heat = new Set([3, 9, 14, 21, 26]);
                const ai = new Set([5, 17, 24]);
                const birth = new Set(
                    items
                        .filter((e) => e.date_prevue_prochain)
                        .map((e) => new Date(e.date_prevue_prochain).getDate()),
                );
                for (let day = 1; day <= total; day += 1) {
                    let cls = "day";
                    if (heat.has(day)) cls += " heat";
                    if (ai.has(day)) cls += " ai";
                    if (birth.has(day)) cls += " birth";
                    cells.push(
                        `<div class="${cls}"><strong>${day}</strong></div>`,
                    );
                }
                calendar.innerHTML = cells.join("");
            }

            function renderAlerts(items) {
                if (!items.length) {
                    alerts.innerHTML =
                        '<p class="meta">Aucune alerte imminente.</p>';
                    return;
                }
                alerts.innerHTML = items
                    .map(
                        (a) =>
                            `<div class="alert ${a.type === "mise-bas_proche" ? "urgent" : ""}"><strong>${a.message}</strong><div class="meta">${a.espece || ""} ${a.animal_id || ""}</div>${a.whatsapp_url ? `<a class="btn secondary" href="${a.whatsapp_url}" target="_blank" rel="noopener noreferrer" style="display:inline-block;margin-top:10px;text-decoration:none">WhatsApp</a>` : ""}</div>`,
                    )
                    .join("");
            }

            function renderStats(data) {
                stats.innerHTML = [
                    {
                        label: "Taux gestation",
                        value: `${data.taux_gestation_global || 0}%`,
                    },
                    { label: "Saillies", value: data.total_saillies || 0 },
                    { label: "Mises-bas", value: data.total_mises_bas || 0 },
                ]
                    .map(
                        (m) =>
                            `<div class="metric"><strong>${m.value}</strong><div class="meta">${m.label}</div></div>`,
                    )
                    .join("");
            }

            function renderEvents(items) {
                if (!items.length) {
                    events.innerHTML = '<p class="meta">Aucun événement.</p>';
                    return;
                }
                events.innerHTML = items
                    .map(
                        (e) =>
                            `<div class="event-item"><strong>${e.event?.type_evenement || e.type_evenement || "Événement"}</strong><div class="meta">${e.event?.animal_id || e.animal_id || ""} — ${e.event?.date_evenement || e.date_evenement || ""}</div><div class="meta">${e.event?.details || e.notes || ""}</div></div>`,
                    )
                    .join("");
            }

            async function loadData() {
                const cal = await fetch(
                    `/reprotrack/calendrier/${encodeURIComponent(userId)}`,
                ).then((r) => r.json());
                const al = await fetch(
                    `/reprotrack/alertes/${encodeURIComponent(userId)}`,
                ).then((r) => r.json());
                const st = await fetch(
                    `/reprotrack/stats/${encodeURIComponent(userId)}`,
                ).then((r) => r.json());
                buildCalendar(cal.evenements || []);
                renderAlerts(al.alertes || []);
                renderStats(st || {});
                renderEvents(cal.evenements || []);
            }

            $("#saveEvent").addEventListener("click", async () => {
                const payload = {
                    user_id: userId,
                    animal_id: animal.value,
                    espece: species.value,
                    type_evenement: type.value,
                    date_evenement: dateInput.value || new Date().toISOString(),
                    notes: notes.value,
                };
                const res = await fetch("/reprotrack/evenement", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.detail || "Erreur");
                    return;
                }
                await loadData();
            });

            $("#refreshList").addEventListener("click", async () => {
                const params = new URLSearchParams();
                if (filterAnimal.value)
                    params.set("animal_id", filterAnimal.value);
                if (filterDate.value)
                    params.set("date_filtre", filterDate.value);
                if (filterType.value)
                    params.set("type_evenement", filterType.value);
                const cal = await fetch(
                    `/reprotrack/evenements/${encodeURIComponent(userId)}?${params.toString()}`,
                ).then((r) => r.json());
                renderEvents(cal.evenements || []);
            });

            loadData();
        </script>
    </body>
</html>
