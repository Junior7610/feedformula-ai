<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E53935" />
    <title>{{TITLE}}</title>
    <style>
      body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#fff7f7;color:#4b1c1c;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:20px}
      .card{max-width:560px;background:#fff;border-radius:24px;padding:24px;box-shadow:0 20px 40px rgba(0,0,0,.12);text-align:center}
      .aya{font-size:72px;line-height:1}
      .btn{display:inline-block;margin-top:14px;background:#1B5E20;color:#fff;text-decoration:none;padding:14px 18px;border-radius:14px;font-weight:700}
      .muted{color:#6c4d4d}
    </style>
  </head>
  <body>
    <div class="card">
      <div class="aya">😢</div>
      <h1>{{TITLE}}</h1>
      <p class="muted">{{MESSAGE}}</p>
      <a class="btn" href="/app/index.html">Retour à l’accueil</a>
    </div>
  </body>
</html>
