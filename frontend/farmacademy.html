<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FarmAcademy | FeedFormula AI</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                background: #f6faf6;
                color: #163024;
            }
            header,
            main {
                max-width: 1200px;
                margin: auto;
                padding: 20px;
            }
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 16px;
            }
            .card {
                background: #fff;
                border-radius: 18px;
                padding: 16px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            }
            .badge {
                display: inline-block;
                padding: 4px 10px;
                border-radius: 999px;
                background: #e7f5ea;
                color: #19733f;
                font-size: 12px;
            }
            .progress {
                height: 10px;
                background: #e8eee9;
                border-radius: 999px;
                overflow: hidden;
            }
            .bar {
                height: 100%;
                background: linear-gradient(90deg, #3cb371, #1f8f57);
                width: 0%;
            }
            button {
                border: none;
                border-radius: 12px;
                padding: 10px 14px;
                background: #1f8f57;
                color: #fff;
                cursor: pointer;
            }
            button.secondary {
                background: #e7f5ea;
                color: #16663d;
            }
            .lesson-nav {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }
            .quiz-option {
                display: block;
                width: 100%;
                text-align: left;
                margin: 8px 0;
                padding: 10px;
                border: 1px solid #d8e7dc;
                border-radius: 10px;
                background: #fff;
            }
            .quiz-option.correct {
                border-color: #1f8f57;
                background: #e8fff1;
            }
            .quiz-option.wrong {
                border-color: #cc3c3c;
                background: #fff0f0;
            }
            .hidden {
                display: none;
            }
            .muted {
                color: #60756d;
            }
            .score-pop {
                font-size: 34px;
                font-weight: 800;
                color: #1f8f57;
                transition: transform 0.4s ease;
            }
            .score-pop.pulse {
                transform: scale(1.15);
            }
            audio {
                width: 100%;
            }
            .cert-link {
                display: inline-block;
                margin-top: 10px;
            }
        </style>
    </head>
    <body>
        <header>
            <div>
                <h1>FarmAcademy</h1>
                <p class="muted">Catalogue, leçons, quiz et certificats</p>
            </div>
            <div>
                <label
                    >Utilisateur ID<br /><input
                        id="userId"
                        placeholder="ID utilisateur"
                        style="
                            padding: 10px;
                            border-radius: 10px;
                            border: 1px solid #cfe0d4;
                        "
                /></label>
                <button onclick="loadProgress()">Charger ma progression</button>
            </div>
        </header>
        <main>
            <section class="card">
                <h2>Ma progression</h2>
                <div class="progress">
                    <div class="bar" id="globalBar"></div>
                </div>
                <p id="progressText" class="muted">
                    Entrez votre ID utilisateur pour voir votre progression.
                </p>
                <div id="certificateZone"></div>
            </section>

            <section style="margin-top: 20px">
                <h2>Catalogue des formations</h2>
                <div id="catalogue" class="grid"></div>
            </section>

            <section class="card" style="margin-top: 20px">
                <h2 id="lessonTitle">Choisissez une leçon</h2>
                <p id="lessonMeta" class="muted"></p>
                <div id="lessonContent">
                    Cliquez sur une formation pour commencer.
                </div>
                <div class="lesson-nav" style="margin-top: 14px">
                    <button
                        class="secondary"
                        id="prevBtn"
                        onclick="goLesson(-1)"
                    >
                        Précédente
                    </button>
                    <button
                        class="secondary"
                        id="nextBtn"
                        onclick="goLesson(1)"
                    >
                        Suivante
                    </button>
                </div>
                <div style="margin-top: 18px">
                    <h3>Quiz</h3>
                    <div id="quizZone">Le quiz apparaîtra ici.</div>
                    <div id="scoreZone" class="score-pop"></div>
                </div>
            </section>
        </main>

        <script>
            const api = (window.API_BASE || "").replace(/\/$/, "");
            let currentFormation = null;
            let currentLesson = 1;
            let currentLessonData = null;
            let progressCache = null;

            async function jget(url) {
                const r = await fetch(api + url);
                return await r.json();
            }
            async function jpost(url, data) {
                const r = await fetch(api + url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data),
                });
                return await r.json();
            }

            async function loadCatalogue() {
                const data = await jget("/academy/formations");
                const box = document.getElementById("catalogue");
                box.innerHTML = "";
                data.formations.forEach((f) => {
                    const p = progressCache?.formations?.find(
                        (x) => x.code === f.code,
                    );
                    const percent = p ? p.pourcentage : 0;
                    const el = document.createElement("article");
                    el.className = "card";
                    el.innerHTML = `
          <div class="badge">${f.icone} ${f.total_lecons} leçons</div>
          <h3>${f.titre}</h3>
          <p class="muted">${f.resume}</p>
          <div class="progress"><div class="bar" style="width:${percent}%"></div></div>
          <p class="muted">Progression: ${percent}%</p>
          <button onclick="openFormation('${f.code}')">Ouvrir</button>
        `;
                    box.appendChild(el);
                });
            }

            async function loadProgress() {
                const userId = document.getElementById("userId").value.trim();
                if (!userId) {
                    alert("Entrez un ID utilisateur");
                    return;
                }
                progressCache = await jget(
                    `/academy/progression/${encodeURIComponent(userId)}`,
                );
                document.getElementById("globalBar").style.width =
                    progressCache.pourcentage_global + "%";
                document.getElementById("progressText").textContent =
                    `${progressCache.lecons_completees}/${progressCache.total_lecons} leçons complétées (${progressCache.pourcentage_global}%)`;
                document.getElementById("certificateZone").innerHTML =
                    progressCache.pourcentage_global === 100
                        ? "<p><strong>Félicitations !</strong> Vous pouvez télécharger votre certificat.</p>"
                        : "";
                loadCatalogue();
            }

            async function openFormation(code) {
                currentFormation = code;
                currentLesson = 1;
                await loadLesson();
            }

            async function loadLesson() {
                if (!currentFormation) return;
                const data = await jget(
                    `/academy/lecon/${encodeURIComponent(currentFormation)}/${currentLesson}`,
                );
                currentLessonData = data;
                document.getElementById("lessonTitle").textContent =
                    data.lecon.titre;
                document.getElementById("lessonMeta").textContent =
                    `${data.formation.titre} • Leçon ${data.lecon.numero}/${data.formation.total_lecons}`;
                document.getElementById("lessonContent").innerHTML =
                    `<p>${data.lecon.contenu.replace(/\n/g, "</p><p>")}</p>`;
                document.getElementById("quizZone").innerHTML = renderQuiz(
                    data.quiz.questions,
                );
                document.getElementById("scoreZone").textContent = "";
                document.getElementById("prevBtn").disabled =
                    !data.navigation.precedente;
                document.getElementById("nextBtn").disabled =
                    !data.navigation.suivante;
            }

            function renderQuiz(questions) {
                return (
                    questions
                        .map(
                            (q, idx) => `
        <div style="margin-bottom:16px">
          <strong>${idx + 1}. ${q.question}</strong>
          ${q.choix.map((c, i) => `<button class="quiz-option" onclick="answerQuestion(${idx}, ${i})">${c}</button>`).join("")}
          <div class="muted" id="exp-${idx}"></div>
        </div>
      `,
                        )
                        .join("") +
                    '<button onclick="submitQuiz()">Soumettre le quiz</button>'
                );
            }

            function answerQuestion(qIndex, choice) {
                const buttons = document.querySelectorAll(
                    `#quizZone .quiz-option`,
                );
                // minimal local feedback only
                if (window._quizAnswers === undefined) window._quizAnswers = [];
                window._quizAnswers[qIndex] = choice;
                buttons.forEach((b) => b.classList.remove("correct", "wrong"));
                const q = currentLessonData.quiz.questions[qIndex];
                const targetButtons = [
                    ...document.querySelectorAll("#quizZone .quiz-option"),
                ].slice(qIndex * 4, qIndex * 4 + 4);
                targetButtons.forEach((btn, i) =>
                    btn.classList.add(
                        i === choice
                            ? choice === q.bonne_reponse
                                ? "correct"
                                : "wrong"
                            : "",
                    ),
                );
                document.getElementById(`exp-${qIndex}`).textContent =
                    q.explication;
            }

            async function submitQuiz() {
                const userId = document.getElementById("userId").value.trim();
                if (!userId) {
                    alert("Entrez votre ID utilisateur");
                    return;
                }
                const responses = window._quizAnswers || [];
                const data = await jpost("/academy/quiz/soumettre", {
                    user_id: userId,
                    formation_code: currentFormation,
                    numero: currentLesson,
                    reponses: responses,
                });
                const scoreZone = document.getElementById("scoreZone");
                scoreZone.textContent = `+${data.points_gagnes} points`;
                scoreZone.classList.add("pulse");
                setTimeout(() => scoreZone.classList.remove("pulse"), 500);
                if (data.certificat_url) {
                    document.getElementById("certificateZone").innerHTML =
                        `<a class="cert-link" href="${data.certificat_url}" download>Télécharger le certificat PDF</a>`;
                }
                await loadProgress();
            }

            function goLesson(delta) {
                if (!currentLessonData) return;
                const next = currentLesson + delta;
                if (next < 1 || next > currentLessonData.formation.total_lecons)
                    return;
                currentLesson = next;
                loadLesson();
            }

            loadCatalogue();
        </script>
    </body>
</html>
