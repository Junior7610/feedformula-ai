        <style>
            body {
                margin: 0;
                font-family: var(--font-primary);
                background: #fff7f7;
                color: #3a1515;
            }
            .wrap {
                max-width: 980px;
                margin: 0 auto;
                padding: 16px 16px 120px;
            }
            .grid {
                display: grid;
                gap: 16px;
            }
            .card {
                background: #fff;
                border-radius: 20px;
                padding: 16px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            }
            .input,
            .select,
            .textarea {
                width: 100%;
                border: 1px solid #ddd;
                border-radius: 14px;
                padding: 14px;
                font-size: 16px;
                box-sizing: border-box;
            }
            .textarea {
                min-height: 120px;
                resize: vertical;
            }
            .btn {
                border: 0;
                border-radius: 16px;
                padding: 16px;
                font-size: 17px;
                font-weight: 700;
                cursor: pointer;
            }
            .primary {
                background: #e53935;
                color: #fff;
            }
            .secondary {
                background: #f2f2f2;
                color: #222;
            }
            .photo {
                width: 100%;
                min-height: 220px;
                border: 2px dashed #e0b3b3;
                border-radius: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                background: #fff9f9;
            }
            .photo img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .diag {
                margin-top: 10px;
            }
            .diag-head {
                display: flex;
                justify-content: space-between;
                gap: 10px;
                font-weight: 700;
            }
            .bar {
                height: 10px;
                background: #f0e0e0;
                border-radius: 999px;
                overflow: hidden;
                margin-top: 6px;
            }
            .bar span {
                display: block;
                height: 100%;
                background: linear-gradient(90deg, #f9a825, #e53935);
            }
            .decision {
                padding: 14px;
                border-radius: 14px;
                font-weight: 800;
                text-align: center;
                margin-top: 8px;
            }
            .safe {
                background: #e8f5e9;
                color: #1b5e20;
            }
            .urgent {
                background: #ffebee;
                color: #b71c1c;
            }
            .muted {
                color: #666;
                font-size: 14px;
            }
            .history-item {
                padding: 12px 0;
                border-bottom: 1px solid #eee;
            }
        </style>
        <script defer src="assets_manager.js"></script>
    </head>
    <body>
        <div class="wrap">
            <header class="card">
                <h1>🩺 VetScan</h1>
                <p class="muted">
                    Photo, micro ou texte : obtenez un diagnostic différentiel
                    rapide depuis le backend.
                </p>
            </header>

            <main class="grid">
                <section class="card">
                    <h2>Photo de l’animal</h2>
                    <input
                        id="photoInput"
                        type="file"
                        accept="image/*"
                        capture="environment"
                        hidden
                    />
                    <div id="photoPreview" class="photo">
                        Aperçu de la photo
                    </div>
                    <div
                        style="
                            display: grid;
                            grid-template-columns: 1fr 1fr;
                            gap: 10px;
                            margin-top: 12px;
                        "
                    >
                        <button
                            id="photoBtn"
                            class="btn secondary"
                            type="button"
                        >
                            📷 Choisir une photo
                        </button>
                        <button
                            id="analyzePhotoBtn"
                            class="btn primary"
                            type="button"
                        >
                            Analyser la photo
                        </button>
                    </div>
                </section>

                <section class="card">
                    <h2>Symptômes et espèce</h2>
                    <div style="display: grid; gap: 12px">
                        <button id="micBtn" class="btn secondary" type="button">
                            🎤 Dicter les symptômes
                        </button>
                        <select id="speciesSelect" class="select">
                            <option value="">Choisir l’espèce</option>
                            <option>Vache</option>
                            <option>Chèvre</option>
                            <option>Mouton</option>
                            <option>Poulet</option>
                            <option>Porc</option>
                            <option>Tilapia</option>
                            <option>Pintade</option>
                        </select>
                        <textarea
                            id="symptomsInput"
                            class="textarea"
                            placeholder="Décrivez les symptômes observés..."
                        ></textarea>
                        <button
                            id="diagnoseBtn"
                            class="btn primary"
                            type="button"
                        >
                            🔍 Diagnostiquer maintenant
                        </button>
                    </div>
                </section>

                <section id="resultBox" class="card" hidden>
                    <h2>Résultat du diagnostic</h2>
                    <div id="decisionBox" class="decision safe">
                        Soins autonomes possibles
                    </div>
                    <div id="diagnostics"></div>
                    <h3>Protocole de soins</h3>
                    <ul id="protocol"></ul>
                    <p id="urgenceMsg" class="muted"></p>
                    <p id="preventionMsg" class="muted"></p>
                    <a
                        id="vetLink"
                        class="btn primary"
                        href="https://www.google.com/maps/search/veterinaire"
                        target="_blank"
                        rel="noopener noreferrer"
                        hidden
                        >📍 Trouver un vétérinaire</a
                    >
                    >
                </section>

                <section class="card">
                    <h2>Historique récent</h2>
                    <div
                        id="history"
                        aria-live="polite"
                        aria-busy="false"
                    ></div>
                </section>
            </main>
        </div>

        <script>
            const $ = (s) => document.querySelector(s);
            const photoInput = $("#photoInput");
            const photoBtn = $("#photoBtn");
            const analyzePhotoBtn = $("#analyzePhotoBtn");
            const diagnoseBtn = $("#diagnoseBtn");
            const symptomsInput = $("#symptomsInput");
            const speciesSelect = $("#speciesSelect");
            const photoPreview = $("#photoPreview");
            const resultBox = $("#resultBox");
            const diagnosticsBox = $("#diagnostics");
            const protocolBox = $("#protocol");
            const decisionBox = $("#decisionBox");
            const urgenceMsg = $("#urgenceMsg");
            const preventionMsg = $("#preventionMsg");
            const vetLink = $("#vetLink");
            const historyBox = $("#history");
            let selectedFile = null;

            function getHistory() {
                try {
                    return JSON.parse(
                        localStorage.getItem("feedformula_vet_history_v3") ||
                            "[]",
                    );
                } catch {
                    return [];
                }
            }
            function setHistory(items) {
                localStorage.setItem(
                    "feedformula_vet_history_v3",
                    JSON.stringify(items),
                );
            }
            function renderHistory() {
                const items = getHistory().slice(0, 5);
                if (!items.length) {
                    historyBox.innerHTML =
                        '<p class="muted">Aucun diagnostic enregistré.</p>';
                    return;
                }
                historyBox.innerHTML = items
                    .map(
                        (item) =>
                            `<div class="history-item"><strong>${item.espece}</strong><div class="muted">${new Date(item.date).toLocaleString("fr-FR")}</div><div>${item.top}</div></div>`,
                    )
                    .join("");
            }
            function pushHistory(item) {
                setHistory([item, ...getHistory()].slice(0, 10));
                renderHistory();
            }
            function renderResult(payload) {
                const r = payload.resultat || payload;
                const diags = [
                    r.diagnostic_1,
                    r.diagnostic_2,
                    r.diagnostic_3,
                ].filter(Boolean);
                resultBox.hidden = false;
                diagnosticsBox.innerHTML = diags
                    .map((d, i) => {
                        const p = Math.round((d.probabilite || 0) * 100);
                        return `<div class="diag"><div class="diag-head"><span>${i + 1}. ${d.nom}</span><strong>${p}%</strong></div><div class="bar"><span style="width:${p}%"></span></div><div class="muted">${d.description || ""}</div></div>`;
                    })
                    .join("");
                protocolBox.innerHTML = (r.protocole_soins || [])
                    .map((step) => `<li>${step}</li>`)
                    .join("");
                decisionBox.className = `decision ${r.decision === "urgence" ? "urgent" : "safe"}`;
                decisionBox.textContent =
                    r.decision === "urgence"
                        ? "⚠️ URGENCE VÉTÉRINAIRE"
                        : "✅ Soins autonomes possibles";
                urgenceMsg.textContent = r.message_urgence || "";
                preventionMsg.textContent = r.prevention || "";
                vetLink.hidden = r.decision !== "urgence";
                pushHistory({
                    date: new Date().toISOString(),
                    espece: speciesSelect.value || "Animal",
                    top: diags[0]?.nom || "Diagnostic",
                    result: r,
                });
            }
            photoBtn.addEventListener("click", () => photoInput.click());
            photoInput.addEventListener("change", () => {
                selectedFile = photoInput.files?.[0] || null;
                if (!selectedFile) return;
                const reader = new FileReader();
                reader.onload = () => {
                    photoPreview.innerHTML = `<img src="${reader.result}" alt="Prévisualisation">`;
                };
                reader.readAsDataURL(selectedFile);
            });
            diagnoseBtn.addEventListener("click", async () => {
                const payload = {
                    espece: speciesSelect.value || "Animal",
                    symptomes: symptomsInput.value || "",
                    langue: "fr",
                };
                const res = await fetch("/vetscan/diagnostiquer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                renderResult(await res.json());
            });
            analyzePhotoBtn.addEventListener("click", async () => {
                if (!selectedFile) {
                    alert("Choisissez d’abord une photo.");
                    return;
                }
                const form = new FormData();
                form.append("image", selectedFile);
                form.append("espece", speciesSelect.value || "Animal");
                form.append("langue", "fr");
                const res = await fetch("/vetscan/analyser-photo", {
                    method: "POST",
                    body: form,
                });
                renderResult(await res.json());
            });
            micBtn.addEventListener("click", () => {
                const txt = prompt("Décrivez les symptômes :");
                if (txt) symptomsInput.value = txt;
            });
            renderHistory();
        </script>
    </body>
</html>
