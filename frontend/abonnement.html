<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Abonnement | FeedFormula AI</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                background: #f7f9fc;
                color: #15202b;
            }
            header,
            main {
                max-width: 1200px;
                margin: auto;
                padding: 20px;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 14px;
            }
            .card {
                background: #fff;
                border-radius: 18px;
                padding: 16px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            }
            .price {
                font-size: 30px;
                font-weight: 800;
                color: #1769ff;
            }
            input {
                width: 100%;
                padding: 11px;
                border: 1px solid #d7dee8;
                border-radius: 10px;
                margin-top: 6px;
            }
            button {
                border: none;
                border-radius: 12px;
                padding: 10px 14px;
                background: #1769ff;
                color: #fff;
                cursor: pointer;
            }
            button.secondary {
                background: #e9f1ff;
                color: #174da0;
            }
            .muted {
                color: #607086;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                background: #fff;
                border-radius: 18px;
                overflow: hidden;
            }
            th,
            td {
                padding: 12px;
                border-bottom: 1px solid #edf1f5;
                text-align: left;
            }
            .success,
            .error {
                padding: 12px;
                border-radius: 14px;
                margin-top: 12px;
            }
            .success {
                background: #e9fbef;
                color: #167a3e;
            }
            .error {
                background: #fff1f1;
                color: #b03333;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Abonnements FeedFormula AI</h1>
            <p class="muted">
                Choisissez une offre, saisissez votre téléphone et lancez le
                paiement Mobile Money via FedaPay.
            </p>
        </header>
        <main>
            <section class="card">
                <h2>Comparatif des 5 offres</h2>
                <div class="grid" id="plans"></div>
            </section>

            <section class="card" style="margin-top: 16px">
                <h2>Paiement Mobile Money</h2>
                <div class="grid">
                    <label
                        >Utilisateur ID<input
                            id="userId"
                            placeholder="ID utilisateur"
                    /></label>
                    <label
                        >Prénom<input id="prenom" placeholder="Votre prénom"
                    /></label>
                    <label
                        >Téléphone<input
                            id="telephone"
                            placeholder="229xxxxxxxx"
                    /></label>
                    <label
                        >Plan sélectionné<input
                            id="selectedPlan"
                            readonly
                            value="standard"
                    /></label>
                </div>
                <button style="margin-top: 12px" onclick="createPayment()">
                    S abonner
                </button>
                <div id="paymentState"></div>
                <div
                    id="paymentLinkZone"
                    style="margin-top: 12px"
                    class="muted"
                ></div>
            </section>

            <section class="card" style="margin-top: 16px">
                <h2>Suivi de paiement</h2>
                <label
                    >Transaction ID<input
                        id="txId"
                        placeholder="Transaction id"
                /></label>
                <button
                    style="margin-top: 12px"
                    class="secondary"
                    onclick="checkStatus()"
                >
                    Vérifier le statut
                </button>
                <div id="statusZone"></div>
            </section>
        </main>

        <script>
            const api = (window.API_BASE || "").replace(/\/$/, "");
            const plans = {
                free: { label: "Free", price: 0, note: "Découverte" },
                standard: { label: "Standard", price: 2000, note: "Essentiel" },
                premium: { label: "Premium", price: 8000, note: "Avancé" },
                vip: { label: "VIP", price: 25000, note: "Expert" },
                gold: { label: "Gold", price: 75000, note: "Elite" },
            };
            async function jget(url) {
                const r = await fetch(api + url);
                return await r.json();
            }
            async function jpost(url, data) {
                const r = await fetch(api + url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data),
                });
                return await r.json();
            }

            function setPlan(code) {
                document.getElementById("selectedPlan").value = code;
            }
            function renderPlans() {
                const box = document.getElementById("plans");
                box.innerHTML = Object.entries(plans)
                    .map(
                        ([code, p]) => `
        <div class="card">
          <h3>${p.label}</h3>
          <div class="price">${p.price} FCFA</div>
          <p class="muted">${p.note}</p>
          <button onclick="setPlan('${code}')">Sélectionner</button>
        </div>
      `,
                    )
                    .join("");
            }

            async function createPayment() {
                const payload = {
                    user_id: document.getElementById("userId").value.trim(),
                    prenom:
                        document.getElementById("prenom").value.trim() ||
                        "Client",
                    telephone: document
                        .getElementById("telephone")
                        .value.trim(),
                    abonnement: document
                        .getElementById("selectedPlan")
                        .value.trim(),
                };
                const data = await jpost("/paiement/creer", payload);
                document.getElementById("txId").value = data.transaction_id;
                document.getElementById("paymentLinkZone").innerHTML =
                    `<a href="${data.lien_paiement}" target="_blank">Ouvrir le lien de paiement</a>`;
                document.getElementById("paymentState").innerHTML =
                    `<div class="success">Transaction créée pour ${data.montant} FCFA.</div>`;
                window.open(data.lien_paiement, "_blank");
            }

            async function checkStatus() {
                const tx = document.getElementById("txId").value.trim();
                if (!tx) return alert("Transaction ID requis");
                const data = await jget(
                    `/paiement/statut/${encodeURIComponent(tx)}`,
                );
                document.getElementById("statusZone").innerHTML =
                    data.statut === "paid"
                        ? '<div class="success">Paiement confirmé. Abonnement activé.</div>'
                        : '<div class="error">Paiement en attente ou refusé. Réessayez.</div>';
            }

            renderPlans();
        </script>
    </body>
</html>
